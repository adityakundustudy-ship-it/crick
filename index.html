<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricPulse | Live Aesthetic Scores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #112211, #050505);
            color: #ffffff;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover {
            transform: translateY(-8px);
            border-color: #4ade80;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.7); }
            100% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-16">
        <div>
            <h1 class="text-5xl font-extrabold tracking-tighter italic uppercase">
                CRIC<span class="text-green-400">PULSE</span>
            </h1>
            <p class="text-gray-400 text-xs uppercase tracking-[0.3em] mt-1 font-light">RapidAPI Real-time Engine</p>
        </div>
        <div id="connection-status" class="flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 text-[10px] text-gray-400 font-mono">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> LIVE SYNC
        </div>
    </header>

    <main id="match-container" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="col-span-full text-center py-20">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-green-400 mb-4"></div>
            <p class="text-gray-500 tracking-widest text-sm italic uppercase">Connecting to RapidAPI...</p>
        </div>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass-card rounded-3xl py-4 px-8 flex justify-between items-center z-50">
        <button class="text-green-400">🏏</button>
        <button class="text-gray-500 hover:text-white">📅</button>
        <button class="text-gray-500 hover:text-white">📊</button>
    </nav>

    <script>
        const API_KEY = "9585b85576msh561a5bb9e61c701p17f7bfjsn840a0cc4dcde";
        const API_HOST = "cricbuzz-live-score-v1.p.rapidapi.com"; // Common RapidAPI Host
        const CONTAINER = document.getElementById('match-container');

        async function fetchScores() {
            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': API_KEY,
                    'x-rapidapi-host': API_HOST
                }
            };

            try {
                // Fetching current matches from RapidAPI
                const response = await fetch(`https://${API_HOST}/matches/current`, options);
                const result = await response.json();

                // Clear loading state
                CONTAINER.innerHTML = '';

                if (result && result.typeMatches) {
                    renderMatches(result.typeMatches);
                } else {
                    renderNoMatches();
                }
            } catch (error) {
                console.error(error);
                CONTAINER.innerHTML = `<div class="col-span-full text-center text-red-400 font-mono">API Connection Failed. Check RapidAPI subscription.</div>`;
            }
        }

        function renderMatches(typeMatches) {
            // Flattening the nested RapidAPI response (International, League, etc.)
            let allMatches = [];
            typeMatches.forEach(type => {
                if (type.seriesMatches) {
                    type.seriesMatches.forEach(series => {
                        if (series.seriesAdWrapper) {
                            series.seriesAdWrapper.matches.forEach(m => allMatches.push(m));
                        }
                    });
                }
            });

            if (allMatches.length === 0) { renderNoMatches(); return; }

            allMatches.slice(0, 6).forEach(match => {
                const info = match.matchInfo;
                const score = match.matchScore;

                const card = `
                    <div class="glass-card rounded-[2.5rem] p-8 relative flex flex-col justify-between">
                        <div class="flex justify-between items-start mb-10">
                            <span class="${info.state === 'In Progress' ? 'bg-red-500 pulse' : 'bg-gray-700'} text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">
                                ${info.state === 'In Progress' ? 'LIVE' : info.state}
                            </span>
                            <span class="text-white/30 text-[10px] font-mono uppercase tracking-widest">${info.matchFormat}</span>
                        </div>

                        <div class="space-y-6">
                            <div class="flex justify-between items-center">
                                <span class="text-2xl font-bold tracking-tight">${info.team1.teamName}</span>
                                <span class="text-xl font-extrabold text-white">${score?.team1Score?.inngs1?.runs || '0'}/${score?.team1Score?.inngs1?.wickets || '0'}</span>
                            </div>

                            <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>

                            <div class="flex justify-between items-center">
                                <span class="text-2xl font-bold tracking-tight text-gray-400">${info.team2.teamName}</span>
                                <span class="text-xl font-extrabold text-gray-400">${score?.team2Score?.inngs1?.runs || '0'}/${score?.team2Score?.inngs1?.wickets || '0'}</span>
                            </div>
                        </div>

                        <div class="mt-12">
                            <p class="text-green-400 text-xs font-semibold uppercase tracking-tighter italic">
                                ${info.status}
                            </p>
                        </div>
                    </div>
                `;
                CONTAINER.innerHTML += card;
            });
        }

        function renderNoMatches() {
            CONTAINER.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500 italic">No matches currently in progress.</div>`;
        }

        fetchScores();
        setInterval(fetchScores, 60000); // Auto-refresh every 60s
    </script>
</body>
</html>
