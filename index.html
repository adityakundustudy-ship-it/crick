<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE | Global News Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a; /* Deep Slate */
            color: #f8fafc;
        }
        .serif-header { font-family: 'Playfair Display', serif; }
        
        .news-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .news-card:hover {
            transform: translateY(-10px);
            border-color: #818cf8; /* Indigo glow */
            background: rgba(30, 41, 59, 0.8);
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        /* Custom Loader */
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #FFF;
            border-bottom-color: #818cf8;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-7xl mx-auto flex justify-between items-end mb-20 border-b border-white/10 pb-8">
        <div>
            <p class="text-indigo-400 text-xs font-bold tracking-[0.4em] uppercase mb-2">The Intelligence Feed</p>
            <h1 class="text-6xl font-bold serif-header tracking-tight">PULSE<span class="text-indigo-500">.</span></h1>
        </div>
        <div class="hidden md:flex gap-8 text-sm font-medium text-gray-400">
            <button onclick="fetchNews('top')" class="hover:text-white transition">World</button>
            <button onclick="fetchNews('technology')" class="hover:text-white transition">Tech</button>
            <button onclick="fetchNews('sports')" class="hover:text-white transition">Sports</button>
            <button onclick="fetchNews('business')" class="hover:text-white transition">Business</button>
        </div>
    </header>

    <main id="news-container" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        <div class="col-span-full flex flex-col items-center justify-center py-20">
            <span class="loader"></span>
            <p class="mt-4 text-gray-500 tracking-widest text-xs">COLLECTING HEADLINES</p>
        </div>
    </main>

    <footer class="max-w-7xl mx-auto mt-20 py-10 border-t border-white/5 text-center">
        <p class="text-gray-600 text-xs uppercase tracking-widest">Powered by NewsData.io &copy; 2026</p>
    </footer>

    <script>
        const API_KEY = "pub_f4f1e153a16f4b1e813f86ab2db2c653";
        const container = document.getElementById('news-container');

        async function fetchNews(category = 'top') {
            container.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-20">
                    <span class="loader"></span>
                </div>`;

            try {
                const response = await fetch(`https://newsdata.io/api/1/news?apikey=${API_KEY}&category=${category}&language=en`);
                const data = await response.json();

                if (data.results) {
                    renderNews(data.results);
                }
            } catch (error) {
                container.innerHTML = `<p class="col-span-full text-center text-red-400">Unable to load news. Check API limits.</p>`;
            }
        }

        function renderNews(articles) {
            container.innerHTML = '';
            
            articles.forEach(article => {
                // Use a placeholder if image is missing
                const imageUrl = article.image_url || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=800&q=80';
                const date = new Date(article.pubDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                const card = `
                    <div class="news-card rounded-3xl overflow-hidden flex flex-col cursor-pointer" onclick="window.open('${article.link}', '_blank')">
                        <div class="h-60 w-full relative overflow-hidden">
                            <img src="${imageUrl}" class="w-full h-full object-cover grayscale-[30%] hover:grayscale-0 transition-all duration-700 hover:scale-110" alt="news">
                            <div class="absolute top-4 left-4">
                                <span class="bg-indigo-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest shadow-xl">
                                    ${article.category[0] || 'News'}
                                </span>
                            </div>
                        </div>
                        <div class="p-8 flex flex-col flex-grow">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-indigo-400 text-[10px] font-bold uppercase tracking-widest">${article.source_id}</span>
                                <span class="text-gray-500 text-[10px] font-mono">${date}</span>
                            </div>
                            <h2 class="text-xl font-bold leading-tight mb-4 hover:text-indigo-400 transition cursor-pointer">${article.title}</h2>
                            <p class="text-gray-400 text-sm leading-relaxed line-clamp-3 mb-6 font-light">
                                ${article.description || 'Click to read the full coverage on this breaking story...'}
                            </p>
                            <div class="mt-auto flex items-center gap-2 text-indigo-400 text-xs font-bold uppercase tracking-widest group">
                                Read Article 
                                <span class="group-hover:translate-x-2 transition-transform">→</span>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // Initial Load
        fetchNews();
    </script>
</body>
</html>
